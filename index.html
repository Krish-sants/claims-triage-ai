<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClaimSense — AI Claims Triage</title>
<style>
  :root { --bg:#f6f7f9; --card:#fff; --text:#1a1d21; --muted:#5f6672; --accent:#0b5fff; --border:#e3e6ea; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#111417; --card:#1a1f24; --text:#e8eaed; --muted:#9aa3ad; --accent:#4d8dff; --border:#2a3138; }
  }
  * { box-sizing:border-box; margin:0; }
  body { font:15px/1.55 system-ui,Segoe UI,sans-serif; background:var(--bg); color:var(--text); padding:2rem 1rem; }
  .wrap { max-width:1040px; margin:0 auto; }
  h1 { font-size:1.5rem; margin-bottom:.25rem; }
  .sub { color:var(--muted); margin-bottom:1.5rem; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }
  @media (max-width:820px){ .grid { grid-template-columns:1fr; } }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.25rem; }
  label { display:block; font-size:.8rem; color:var(--muted); margin:.7rem 0 .2rem; }
  input, textarea, select { width:100%; padding:.5rem .6rem; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); font:inherit; }
  textarea { min-height:110px; resize:vertical; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
  button { margin-top:1rem; padding:.6rem 1.2rem; border:0; border-radius:8px; background:var(--accent); color:#fff; font:600 .95rem system-ui; cursor:pointer; }
  button.ghost { background:transparent; color:var(--accent); border:1px solid var(--accent); margin-right:.5rem; }
  .badge { display:inline-block; padding:.15rem .6rem; border-radius:999px; font-size:.78rem; font-weight:600; }
  .low{background:#e6f4ea;color:#137333} .medium{background:#fef7e0;color:#b06000}
  .high{background:#fce8e6;color:#c5221f} .catastrophic{background:#c5221f;color:#fff}
  .kv { margin:.4rem 0; } .kv b { font-weight:600; }
  .flag { border-left:3px solid #c5221f; padding:.3rem .6rem; margin:.4rem 0; background:var(--bg); border-radius:0 8px 8px 0; font-size:.86rem; }
  pre { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:.8rem; white-space:pre-wrap; font-size:.82rem; }
  .muted { color:var(--muted); font-size:.85rem; }
  #result:empty::after { content:"Submit a claim to see the triage decision."; color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>ClaimSense — AI Claims Triage</h1>
  <p class="sub">FNOL intake → fact extraction → severity model → fraud red flags → routing &amp; customer email, in one call.</p>
  <div class="grid">
    <div class="card">
      <button class="ghost" type="button" onclick="fill('clean')">Sample: clean motor claim</button>
      <button class="ghost" type="button" onclick="fill('fraud')">Sample: suspicious theft claim</button>
      <form id="f">
        <div class="row">
          <div><label>Claimant name</label><input name="claimant_name" required value="Asha Verma"></div>
          <div><label>Policy type</label>
            <select name="policy_type"><option>motor</option><option>property</option><option>health</option></select></div>
        </div>
        <label>Incident description (FNOL)</label>
        <textarea name="description" required></textarea>
        <div class="row">
          <div><label>Claim amount (INR)</label><input name="claim_amount" type="number" value="45000" min="1" required></div>
          <div><label>Days between incident &amp; report</label><input name="report_delay_days" type="number" value="1" min="0" required></div>
        </div>
        <div class="row">
          <div><label>Policy tenure (months)</label><input name="policy_tenure_months" type="number" value="26" min="0" required></div>
          <div><label>Prior claims (3 yrs)</label><input name="prior_claims_count" type="number" value="0" min="0" required></div>
        </div>
        <button type="submit">Triage claim</button>
      </form>
    </div>
    <div class="card" id="result"></div>
  </div>
</div>
<script>
const samples = {
  clean: { description: "Another car rear ended me at a traffic signal on the highway. Minor damage to the rear bumper and boot. Police report was filed at the scene and the other driver accepted fault. No injuries.", claim_amount: 45000, report_delay_days: 1, policy_tenure_months: 26, prior_claims_count: 0, policy_type: "motor" },
  fraud: { description: "My house was broken into while I was away. Everything was stolen - electronics, jewellery, all my belongings completely gone. Most items were bought with cash so I have no receipts. My lawyer said I should claim the full amount.", claim_amount: 500000, report_delay_days: 21, policy_tenure_months: 2, prior_claims_count: 2, policy_type: "property" },
};
function fill(kind){
  const s = samples[kind], f = document.getElementById('f');
  for (const [k,v] of Object.entries(s)) if (f[k]) f[k].value = v;
}
fill('clean');
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  for (const k of ['claim_amount','report_delay_days','policy_tenure_months','prior_claims_count']) data[k] = Number(data[k]);
  const out = document.getElementById('result');
  out.innerHTML = '<p class="muted">Triaging…</p>';
  try {
    const r = await fetch('/api/triage', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    if (!r.ok) throw new Error((await r.json()).detail?.[0]?.msg || r.statusText);
    const d = await r.json();
    out.innerHTML = `
      <div class="kv"><b>Reference:</b> ${d.claim_ref} <span class="muted">(${d.processing_ms} ms)</span></div>
      <div class="kv"><b>Incident type:</b> ${d.extracted_facts.incident_type}
        <span class="muted">via ${d.extracted_facts.extraction_backend}</span></div>
      <div class="kv"><b>Severity:</b> <span class="badge ${d.severity.severity_tier}">${d.severity.severity_tier}</span>
        score ${d.severity.severity_score} <span class="muted">(model AUC ${d.severity.model_roc_auc})</span></div>
      <div class="kv"><b>Fraud:</b> <span class="badge ${d.fraud.fraud_tier}">${d.fraud.fraud_tier}</span>
        score ${d.fraud.fraud_score} ${d.fraud.siu_referral ? '→ <b>SIU referral</b>' : ''}</div>
      ${d.fraud.red_flags.map(f=>`<div class="flag"><b>${f.rule}</b> (+${f.weight}) — ${f.detail}</div>`).join('')}
      <div class="kv"><b>Routing:</b> ${d.routing.queue.replaceAll('_',' ')} · SLA ${d.routing.sla_hours}h</div>
      <label>Draft customer acknowledgement</label>
      <pre>${d.customer_email_draft}</pre>`;
  } catch (err) { out.innerHTML = `<p class="flag">Error: ${err.message}</p>`; }
});
</script>
</body>
</html>
